<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이예인의 과학 홈페이지 - 단원 목록</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg-deep:#020024;
    --bg-mid:#00164d;
    --accent:#00e5ff;
    --accent-dim:#0088aa;
    --panel:rgba(4,14,40,.55);
    --text-soft:#bcd9e8;
}

body{
    min-height:100vh;
    font-family:'맑은 고딕',sans-serif;
    background:linear-gradient(-45deg,#020024,#00164d,#003a7a,#00164d);
    background-size:400% 400%;
    animation:bg 18s infinite;
    color:white;
    overflow-x:hidden;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.star{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2.5s infinite;
    z-index:0;
}

@keyframes twinkle{
    50%{opacity:.15;}
}

/* 레이아웃 */
.layout{
    display:flex;
    min-height:100vh;
    position:relative;
    z-index:2;
}

/* 왼쪽 메뉴 */
.sidebar{
    width:300px;
    flex-shrink:0;
    background:var(--panel);
    backdrop-filter:blur(10px);
    border-right:1px solid rgba(0,229,255,.25);
    padding:36px 0;
    display:flex;
    flex-direction:column;
    position:relative;
}

.sidebar-title{
    font-family:'Orbitron',sans-serif;
    font-size:15px;
    letter-spacing:3px;
    color:var(--accent);
    padding:0 30px 26px 30px;
    text-shadow:0 0 12px rgba(0,229,255,.6);
}

.sidebar-title span{
    display:block;
    font-family:'맑은 고딕',sans-serif;
    letter-spacing:0;
    font-size:13px;
    color:var(--text-soft);
    margin-top:6px;
}

nav{
    display:flex;
    flex-direction:column;
}

.menu-item{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 30px;
    cursor:pointer;
    border-left:3px solid transparent;
    transition:.25s;
}

.menu-item:hover{
    background:rgba(0,229,255,.07);
}

.menu-item.active{
    background:rgba(0,229,255,.12);
    border-left:3px solid var(--accent);
}

.menu-num{
    font-family:'Orbitron',sans-serif;
    font-size:13px;
    color:var(--accent-dim);
    width:22px;
    transition:.25s;
}

.menu-item.active .menu-num,
.menu-item:hover .menu-num{
    color:var(--accent);
    text-shadow:0 0 8px cyan;
}

.menu-label{
    font-size:16px;
    color:#e6f6ff;
}

.menu-item.active .menu-label{
    font-weight:bold;
}

/* 궤도 표시기 - 활성 메뉴 옆에 떠 있는 작은 위성 */
.orbit-dot{
    position:absolute;
    left:8px;
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 10px cyan,0 0 20px cyan;
    transition:top .35s cubic-bezier(.4,0,.2,1);
}

.back-btn{
    margin:20px 30px 0 30px;
    padding:10px 0;
    text-align:center;
    font-size:13px;
    color:var(--text-soft);
    border:1px solid rgba(255,255,255,.2);
    border-radius:20px;
    cursor:pointer;
    transition:.2s;
}
.back-btn:hover{
    border-color:var(--accent);
    color:var(--accent);
}

/* 오른쪽 콘텐츠 */
.content{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    padding:60px 90px;
    position:relative;
}

.content-eyebrow{
    font-family:'Orbitron',sans-serif;
    font-size:14px;
    letter-spacing:4px;
    color:var(--accent-dim);
    margin-bottom:14px;
}

.content-title{
    font-size:52px;
    font-weight:900;
    color:#fff;
    text-shadow:0 0 25px rgba(0,229,255,.5);
    line-height:1.3;
    max-width:820px;
}

.content-desc{
    margin-top:22px;
    font-size:18px;
    color:var(--text-soft);
    max-width:560px;
    line-height:1.7;
}

.content-icon{
    position:absolute;
    right:80px;
    top:50%;
    transform:translateY(-50%);
    font-size:150px;
    opacity:.5;
    filter:drop-shadow(0 0 30px cyan);
}

@media(max-width:800px){
    .layout{flex-direction:column;}
    .sidebar{width:100%;}
    .content{padding:40px 30px;}
    .content-title{font-size:34px;}
    .content-icon{display:none;}
}
</style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="sidebar-title">UNIT INDEX
            <span>이예인의 과학 노트 · 단원 목록</span>
        </div>

        <nav id="menu">
            <div class="orbit-dot" id="orbitDot"></div>

            <div class="menu-item active" data-title="과학과 인류의 지속가능한 삶" data-desc="과학기술이 인류와 지구의 지속가능한 미래를 위해 어떤 역할을 하는지 살펴봅니다." data-icon="🌍">
                <span class="menu-num">01</span>
                <span class="menu-label">과학과 인류의 지속가능한 삶</span>
            </div>
            <div class="menu-item" data-title="생물의 구성과 다양성" data-desc="세포부터 생태계까지, 생물이 이루는 구조와 다양한 생명의 모습을 알아봅니다." data-icon="🧬">
                <span class="menu-num">02</span>
                <span class="menu-label">생물의 구성과 다양성</span>
            </div>
            <div class="menu-item" data-title="열" data-desc="열의 이동과 평형, 우리 생활 속 열 현상의 원리를 탐구합니다." data-icon="🔥">
                <span class="menu-num">03</span>
                <span class="menu-label">열</span>
            </div>
            <div class="menu-item" data-title="물질의 상태 변화" data-desc="고체·액체·기체 사이의 변화와 그 안에 숨은 에너지의 흐름을 배웁니다." data-icon="💧">
                <span class="menu-num">04</span>
                <span class="menu-label">물질의 상태 변화</span>
            </div>
            <div class="menu-item" data-title="힘의 작용" data-desc="여러 가지 힘의 종류와 물체의 운동에 힘이 미치는 영향을 살펴봅니다." data-icon="🪐">
                <span class="menu-num">05</span>
                <span class="menu-label">힘의 작용</span>
            </div>
            <div class="menu-item" data-title="기체의 성질" data-desc="압력과 온도에 따라 달라지는 기체의 부피와 성질을 탐구합니다." data-icon="🎈">
                <span class="menu-num">06</span>
                <span class="menu-label">기체의 성질</span>
            </div>
            <div class="menu-item" data-title="태양계" data-desc="태양계를 이루는 행성들과 우주 속 지구의 위치를 알아봅니다." data-icon="🛸">
                <span class="menu-num">07</span>
                <span class="menu-label">태양계</span>
            </div>
        </nav>

        <div class="back-btn" onclick="location.href='index.html'">← 처음으로</div>
    </aside>

    <main class="content">
        <div class="content-eyebrow">UNIT 01</div>
        <h1 class="content-title" id="contentTitle">과학과 인류의 지속가능한 삶</h1>
        <p class="content-desc" id="contentDesc">과학기술이 인류와 지구의 지속가능한 미래를 위해 어떤 역할을 하는지 살펴봅니다.</p>
        <div class="content-icon" id="contentIcon">🌍</div>
    </main>

</div>

<script>
// 별 배경
for(let i=0;i<140;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDuration=(1+Math.random()*3)+"s";
    document.body.appendChild(star);
}

// 메뉴 클릭 동작
const items=document.querySelectorAll(".menu-item");
const orbitDot=document.getElementById("orbitDot");
const eyebrow=document.querySelector(".content-eyebrow");
const title=document.getElementById("contentTitle");
const desc=document.getElementById("contentDesc");
const icon=document.getElementById("contentIcon");

function moveDot(el){
    const menuRect=document.getElementById("menu").getBoundingClientRect();
    const itemRect=el.getBoundingClientRect();
    orbitDot.style.top=(itemRect.top - menuRect.top + itemRect.height/2 - 3)+"px";
}

items.forEach((item,idx)=>{
    item.addEventListener("click",()=>{
        items.forEach(i=>i.classList.remove("active"));
        item.classList.add("active");
        moveDot(item);

        eyebrow.textContent="UNIT "+String(idx+1).padStart(2,"0");
        title.style.opacity=0;
        desc.style.opacity=0;
        icon.style.opacity=0;

        setTimeout(()=>{
            title.textContent=item.dataset.title;
            desc.textContent=item.dataset.desc;
            icon.textContent=item.dataset.icon;
            title.style.transition="opacity .3s";
            desc.style.transition="opacity .3s";
            icon.style.transition="opacity .3s";
            title.style.opacity=1;
            desc.style.opacity=1;
            icon.style.opacity=.5;
        },150);
    });
});

// 초기 위치 설정
window.addEventListener("load",()=>moveDot(items[0]));
</script>

</body>
</html>
