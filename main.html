<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg-deep:#020024;
    --bg-mid:#00164d;
    --accent:#ffd700;
    --accent-dim:#c99a2e;
    --panel:rgba(4,14,40,.55);
    --text-soft:#e8d9a8;
}

body{
    min-height:100vh;
    font-family:'맑은 고딕',sans-serif;
    background:radial-gradient(ellipse at center,#0a0a0a 0%,#000000 70%);
    color:#ffd700;
    overflow-x:hidden;
}

.star{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2.5s infinite;
    z-index:0;
}

@keyframes twinkle{
    50%{opacity:.15;}
}

/* 레이아웃 */
.layout{
    display:flex;
    min-height:100vh;
    position:relative;
    z-index:2;
}

/* 왼쪽 메뉴 */
.sidebar{
    width:300px;
    flex-shrink:0;
    background:var(--panel);
    backdrop-filter:blur(10px);
    border-right:1px solid rgba(0,229,255,.25);
    padding:36px 0;
    display:flex;
    flex-direction:column;
    position:relative;
}

.sidebar-title{
    font-family:'Orbitron',sans-serif;
    font-size:15px;
    letter-spacing:3px;
    color:var(--accent);
    padding:0 30px 26px 30px;
    text-shadow:0 0 12px rgba(0,229,255,.6);
}

.sidebar-title span{
    display:block;
    font-family:'맑은 고딕',sans-serif;
    letter-spacing:0;
    font-size:13px;
    color:var(--text-soft);
    margin-top:6px;
}

nav{
    display:flex;
    flex-direction:column;
}

.menu-item{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 30px;
    cursor:pointer;
    border-left:3px solid transparent;
    transition:.25s;
}

.menu-item:hover{
    background:rgba(0,229,255,.07);
}

.menu-item.active{
    background:rgba(0,229,255,.12);
    border-left:3px solid var(--accent);
}

.menu-num{
    font-family:'Orbitron',sans-serif;
    font-size:13px;
    color:var(--accent-dim);
    width:22px;
    transition:.25s;
}

.menu-item.active .menu-num,
.menu-item:hover .menu-num{
    color:var(--accent);
    text-shadow:0 0 8px cyan;
}

.menu-label{
    font-size:16px;
    color:#f5e6c0;
}

.menu-item.active .menu-label{
    font-weight:bold;
}

/* 궤도 표시기 - 활성 메뉴 옆에 떠 있는 작은 위성 */
.orbit-dot{
    position:absolute;
    left:8px;
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 10px cyan,0 0 20px cyan;
    transition:top .35s cubic-bezier(.4,0,.2,1);
}

.back-btn{
    margin:20px 30px 0 30px;
    padding:10px 0;
    text-align:center;
    font-size:13px;
    color:var(--text-soft);
    border:1px solid rgba(255,255,255,.2);
    border-radius:20px;
    cursor:pointer;
    transition:.2s;
}
.back-btn:hover{
    border-color:var(--accent);
    color:var(--accent);
}

/* 오른쪽 콘텐츠 */
.content{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    padding:60px 90px;
    position:relative;
}

.content-eyebrow{
    font-family:'Orbitron',sans-serif;
    font-size:14px;
    letter-spacing:4px;
    color:var(--accent-dim);
    margin-bottom:14px;
}

.content-title{
    font-size:52px;
    font-weight:900;
    color:#fff;
    text-shadow:0 0 25px rgba(0,229,255,.5);
    line-height:1.3;
    max-width:820px;
}

.content-desc{
    margin-top:22px;
    font-size:18px;
    color:var(--text-soft);
    max-width:560px;
    line-height:1.7;
}

.content-icon{
    position:absolute;
    right:80px;
    top:50%;
    transform:translateY(-50%);
    font-size:150px;
    opacity:.5;
    filter:drop-shadow(0 0 30px cyan);
}

.content-links{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:12px;
    max-width:560px;
}

.content-link-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 22px;
    background:rgba(0,229,255,.08);
    border:1px solid rgba(0,229,255,.3);
    border-radius:12px;
    cursor:pointer;
    text-decoration:none;
    color:#f5e6c0;
    font-size:16px;
    transition:.25s;
}

.content-link-item:hover{
    background:rgba(0,229,255,.18);
    border-color:var(--accent);
    transform:translateX(4px);
}

.content-link-item .arrow{
    color:var(--accent);
    font-family:'Orbitron',sans-serif;
}

@media(max-width:800px){
    .layout{flex-direction:column;}
    .sidebar{width:100%;}
    .content{padding:40px 30px;}
    .content-title{font-size:34px;}
    .content-icon{display:none;}
}

/* 팝업 모달 */
.modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,4,20,.75);
    backdrop-filter:blur(4px);
    z-index:100;
    align-items:center;
    justify-content:center;
}

.modal-overlay.open{
    display:flex;
}

.modal-box{
    width:min(90vw,900px);
    height:min(85vh,650px);
    background:var(--bg-mid);
    border:1px solid rgba(0,229,255,.35);
    border-radius:16px;
    box-shadow:0 0 40px rgba(0,229,255,.25);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.modal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px;
    background:rgba(0,229,255,.08);
    border-bottom:1px solid rgba(0,229,255,.25);
}

.modal-header span{
    font-size:15px;
    color:#e6f6ff;
    font-weight:bold;
}

.modal-close{
    cursor:pointer;
    width:28px;
    height:28px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-soft);
    border:1px solid rgba(255,255,255,.2);
    transition:.2s;

}

.modal-close:hover{

    border-color:var(--accent);
}

.modal-box iframe{
    flex:1;
    width:100%;
    border:0;
    background:#fff;
}
</style>
</head>

<script>
// 별 배경
for(let i=0;i<140;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDuration=(1+Math.random()*3)+"s";
    document.body.appendChild(star);
}

// 메뉴 클릭 동작
const items=document.querySelectorAll(".menu-item");
const orbitDot=document.getElementById("orbitDot");
const eyebrow=document.querySelector(".content-eyebrow");
const title=document.getElementById("contentTitle");
const desc=document.getElementById("contentDesc");
const icon=document.getElementById("contentIcon");
const linksBox=document.getElementById("contentLinks");

function moveDot(el){
    const menuRect=document.getElementById("menu").getBoundingClientRect();
    const itemRect=el.getBoundingClientRect();
    orbitDot.style.top=(itemRect.top - menuRect.top + itemRect.height/2 - 3)+"px";
}

function renderLinks(item){
    linksBox.innerHTML="";
    if(item.dataset.link){
        const a=document.createElement("div");
        a.className="content-link-item";
        a.innerHTML="<span>"+item.dataset.title+" 학습 페이지 바로가기</span><span class='arrow'>→</span>";
        a.addEventListener("click",()=>openModal(item.dataset.link,item.dataset.title));
        linksBox.appendChild(a);
    }
}

// 모달 팝업
const modalOverlay=document.getElementById("modalOverlay");
const modalFrame=document.getElementById("modalFrame");
const modalTitle=document.getElementById("modalTitle");
const modalClose=document.getElementById("modalClose");

function openModal(url,titleText){
    modalTitle.textContent=titleText+" 학습 페이지";
    modalFrame.src=url;
    modalOverlay.classList.add("open");
}

function closeModal(){
    modalOverlay.classList.remove("open");
    modalFrame.src="";
}

modalClose.addEventListener("click",closeModal);
modalOverlay.addEventListener("click",(e)=>{
    if(e.target===modalOverlay) closeModal();
});
document.addEventListener("keydown",(e)=>{
    if(e.key==="Escape") closeModal();
});

items.forEach((item,idx)=>{
    item.addEventListener("click",()=>{
        items.forEach(i=>i.classList.remove("active"));
        item.classList.add("active");
        moveDot(item);

        eyebrow.textContent="UNIT "+String(idx+1).padStart(2,"0");
        title.style.opacity=0;
        desc.style.opacity=0;
        icon.style.opacity=0;
        linksBox.style.opacity=0;

        setTimeout(()=>{
            title.textContent=item.dataset.title;
            desc.textContent=item.dataset.desc;
            icon.textContent=item.dataset.icon;
            renderLinks(item);
            title.style.transition="opacity .3s";
            desc.style.transition="opacity .3s";
            icon.style.transition="opacity .3s";
            linksBox.style.transition="opacity .3s";
            title.style.opacity=1;
            desc.style.opacity=1;
            icon.style.opacity=.5;
            linksBox.style.opacity=1;
        },150);
    });
});

// 초기 위치 설정
window.addEventListener("load",()=>moveDot(items[0]));
</script>

<script>
// ▼ 여기 이름만 자기 이름으로 바꾸세요 (이 한 줄이 유일하게 바꿀 부분입니다)
const STUDENT_DISPLAY_NAME = "이름";

const firebaseConfig = {
  apiKey: "AIzaSyC0r8Qz_wGGW-TUKUC7RWZ8tyHgBG3kyFk",
  authDomain: "ahwa-science-chat.firebaseapp.com",
  projectId: "ahwa-science-chat",
  storageBucket: "ahwa-science-chat.firebasestorage.app",
  messagingSenderId: "547072324299",
  appId: "1:547072324299:web:76a9a58948f8f1251e214e"
};
firebase.initializeApp(firebaseConfig);
const ahwaDb = firebase.firestore();
</script>

<script>
const chatToggle=document.getElementById("chatToggle");
const chatWindow=document.getElementById("chatWindow");
const chatHeader=document.getElementById("chatHeader");
const chatClose=document.getElementById("chatClose");
const chatMessages=document.getElementById("chatMessages");
const chatInput=document.getElementById("chatInput");
const chatSend=document.getElementById("chatSend");

/* 채팅창 열기/닫기 */
chatToggle.onclick=()=>{
  chatWindow.style.display=(chatWindow.style.display==="flex")?"none":"flex";
  if(chatWindow.style.display==="flex"){
    chatInput.focus();
  }
};

chatClose.onclick=()=>{
  chatWindow.style.display="none";
};

/* 메시지 전송 (Firestore로 실제 전송) */
function sendChatMessage(){
  const text=chatInput.value.trim();
  if(text===""){
    return;
  }

  ahwaDb.collection("messages").add({
    sender: "student",
    senderName: STUDENT_DISPLAY_NAME,
    text: text,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  chatInput.value="";
}

/* Firestore 실시간 메시지 구독 (선생님/다른 학생 메시지 포함, 전체 공용 채팅방) */
ahwaDb.collection("messages")
  .orderBy("createdAt", "asc")
  .onSnapshot(snapshot => {
    chatMessages.innerHTML = "";

    if(snapshot.empty){
      const sys = document.createElement("div");
      sys.className = "chatBubble system";
      sys.textContent = "채팅방에 입장했어요 🙂";
      chatMessages.appendChild(sys);
      return;
    }

    snapshot.forEach(doc => {
      const msg = doc.data();
      const isTeacher = msg.sender === "teacher";
      const isMe = !isTeacher && msg.senderName === STUDENT_DISPLAY_NAME;

      const bubble = document.createElement("div");
      bubble.className = "chatBubble" + (isMe ? " me" : "") + (isTeacher ? " system" : "");

      const label = isTeacher ? "선생님: " : (isMe ? "" : (msg.senderName || "학생") + ": ");
      bubble.textContent = label + msg.text;

      chatMessages.appendChild(bubble);
    });

    chatMessages.scrollTop = chatMessages.scrollHeight;
  });

chatSend.onclick=sendChatMessage;

chatInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    sendChatMessage();
  }
});

/* 채팅창 드래그 이동 */
let dragging=false;
let dragOffsetX=0;
let dragOffsetY=0;

function chatDragStart(x,y){
  dragging=true;
  const rect=chatWindow.getBoundingClientRect();
  dragOffsetX=x-rect.left;
  dragOffsetY=y-rect.top;
  chatWindow.style.right="auto";
  chatWindow.style.bottom="auto";
  chatWindow.style.left=rect.left+"px";
  chatWindow.style.top=rect.top+"px";
}

function chatDragMove(x,y){
  if(!dragging)return;
  let newLeft=x-dragOffsetX;
  let newTop=y-dragOffsetY;
  newLeft=Math.max(0,Math.min(window.innerWidth-chatWindow.offsetWidth,newLeft));
  newTop=Math.max(0,Math.min(window.innerHeight-chatWindow.offsetHeight,newTop));
  chatWindow.style.left=newLeft+"px";
  chatWindow.style.top=newTop+"px";
}

function chatDragEnd(){
  dragging=false;
}

chatHeader.addEventListener("mousedown",e=>{
  if(e.target.id==="chatClose")return;
  chatDragStart(e.clientX,e.clientY);
  e.preventDefault();
});

document.addEventListener("mousemove",e=>{
  chatDragMove(e.clientX,e.clientY);
});

document.addEventListener("mouseup",chatDragEnd);

chatHeader.addEventListener("touchstart",e=>{
  if(e.target.id==="chatClose")return;
  const t=e.touches[0];
  chatDragStart(t.clientX,t.clientY);
});

document.addEventListener("touchmove",e=>{
  if(dragging){
    const t=e.touches[0];
    chatDragMove(t.clientX,t.clientY);
  }
});

document.addEventListener("touchend",chatDragEnd);
</script>
</body>
</html>
