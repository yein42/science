<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이예인의 과학 홈페이지</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'맑은 고딕',sans-serif;
    background:radial-gradient(ellipse at center,#0a0a0a 0%,#000000 70%);
}

/* 블랙홀 */
.blackhole{
    position:relative;
    width:260px;
    height:260px;
    margin:0 auto 6px;
}

.disk{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:conic-gradient(from 0deg,
        #2a1400,
        #ffb703,
        #fff3c4,
        #ffcf40,
        #ffb703,
        #2a1400,
        #000 55%,
        #2a1400);
    filter:blur(5px);
    animation:spin 7s linear infinite;
    box-shadow:0 0 70px 12px rgba(255,183,3,.55),
               0 0 140px 30px rgba(255,183,3,.2);
}

.core{
    position:absolute;
    top:50%;
    left:50%;
    width:58%;
    height:58%;
    transform:translate(-50%,-50%);
    background:#000;
    border-radius:50%;
    box-shadow:0 0 45px 22px #000,
               inset 0 0 30px #000;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.science{
    font-family:'Georgia',serif;
    font-weight:900;
    font-size:64px;
    letter-spacing:12px;
    color:#ffd700;
    text-shadow:0 0 15px rgba(255,215,0,.9),
                0 0 35px rgba(255,183,3,.7),
                0 0 70px rgba(255,183,3,.4);
}

/* 별 */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    50%{opacity:.2;}
}

/* 가운데 */
.box{
    text-align:center;
    color:white;
    z-index:10;
}

h1{
    font-size:75px;
    color:#00ffff;
    text-shadow:0 0 20px cyan,
                0 0 40px cyan,
                0 0 80px cyan;
}

button{
    margin-top:35px;
    padding:15px 40px;
    border:1px solid rgba(255,215,0,.6);
    border-radius:40px;
    background:linear-gradient(135deg,#ffd700,#ffb703);
    color:#1a1000;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
    letter-spacing:2px;
    box-shadow:0 0 25px rgba(255,183,3,.6),
               0 0 55px rgba(255,183,3,.3);
    transition:.25s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 35px rgba(255,215,0,.85),
               0 0 75px rgba(255,183,3,.45);
}
</style>
</head>

<body>

<div class="box">
    <div class="blackhole">
        <div class="disk"></div>
        <div class="core"></div>
    </div>
    <h1 class="science">SCIENCE</h1>

    <button onclick="location.href='main.html'">
        시작하기
    </button>
</div>

<script>

// 별
for(let i=0;i<180;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDuration=(1+Math.random()*3)+"s";
    document.body.appendChild(star);
}

</script>

</body>
</html>
