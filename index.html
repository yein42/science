<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이예인의 홈페이지</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'맑은 고딕',sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#ffeaf5,#fff7fb);
}

/* 떠다니는 동물 */
.animal{
    position:absolute;
    font-size:70px;
    animation:float 6s ease-in-out infinite;
}

.rabbit1{
    top:10%;
    left:8%;
}

.cat1{
    top:15%;
    right:10%;
    animation-delay:1s;
}

.bear{
    bottom:15%;
    left:12%;
    animation-delay:2s;
}

.dog{
    bottom:12%;
    right:12%;
    animation-delay:3s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-25px);
    }
}

/* 하트 */
.heart{
    position:absolute;
    color:#ff69b4;
    animation:up 8s linear infinite;
}

@keyframes up{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-120vh);
        opacity:1;
    }
}

/* 가운데 카드 */
.box{
    background:rgba(255,255,255,0.8);
    padding:60px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(255,105,180,.3);
    backdrop-filter:blur(8px);
}

h1{
    font-size:65px;
    color:#ff4fa0;
    text-shadow:0 0 15px pink;
}

h2{
    margin-top:20px;
    font-size:38px;
    color:#444;
}

p{
    margin-top:15px;
    font-size:28px;
    color:#666;
}

button{
    margin-top:35px;
    padding:15px 40px;
    border:none;
    border-radius:40px;
    background:#ff69b4;
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#ff3d93;
}
</style>
</head>

<body>

<div class="animal rabbit1">🐰</div>
<div class="animal cat1">🐱</div>
<div class="animal bear">🐻</div>
<div class="animal dog">🐶</div>

<div class="box">
    <h1>🧪 과학시간! 🩷</h1>
    <h2>안녕하세요! 이예인입니다.</h2>
    <p>잘 부탁드립니다.</p>

    <button onclick="alert('환영합니다! 💕')">
        시작하기
    </button>
</div>

<script>

// 하트 만들기
for(let i=0;i<40;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💗";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*25)+"px";
    h.style.animationDuration=(5+Math.random()*6)+"s";
    h.style.animationDelay=Math.random()*5+"s";
    document.body.appendChild(h);
}

</script>

</body>
</html>
