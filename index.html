<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개</title>

    <style>
        body {
            margin: 0;
            font-family: "맑은 고딕", sans-serif;
            background-color: #dff6ff; /* 배경색 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #0077b6;
        }

        p {
            font-size: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>안녕하세요!</h1>
        <p>이예인 학생입니다.</p>
        <p>아화중학교에 다니고 있습니다.</p>
        <p>과학시간입니다.</p>
    </div>

</body>
</html>
