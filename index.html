<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이예인의 과학 홈페이지</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'맑은 고딕',sans-serif;
    background:linear-gradient(-45deg,#020024,#00164d,#004cff,#00d9ff);
    background-size:400% 400%;
    animation:bg 12s infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* 별 */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    50%{opacity:.2;}
}

/* 행성 */
.planet{
    position:absolute;
    right:120px;
    top:70px;
    width:180px;
    height:180px;
    border-radius:50%;
    background:radial-gradient(circle,#00ffff,#0066ff,#001b44);
    box-shadow:0 0 60px cyan;
    animation:float 6s ease-in-out infinite;
}

.planet::after{
    content:"";
    position:absolute;
    width:250px;
    height:45px;
    border:5px solid rgba(255,255,255,.5);
    border-radius:50%;
    top:70px;
    left:-35px;
    transform:rotate(-20deg);
}

/* UFO */
.ufo{
    position:absolute;
    font-size:70px;
    top:80px;
    left:-150px;
    animation:fly 18s linear infinite;
}

@keyframes fly{
    from{
        left:-150px;
    }
    to{
        left:110%;
    }
}

/* 외계인 */
.alien{
    position:absolute;
    font-size:90px;
    left:80px;
    bottom:70px;
    animation:bounce 3s infinite;
}

@keyframes bounce{
    50%{
        transform:translateY(-20px);
    }
}

/* 유성 */
.shooting{
    position:absolute;
    color:white;
    font-size:28px;
    animation:meteor 4s linear infinite;
}

@keyframes meteor{
    from{
        transform:translate(120vw,-20vh);
        opacity:1;
    }
    to{
        transform:translate(-20vw,120vh);
        opacity:0;
    }
}

/* 가운데 */
.box{
    text-align:center;
    color:white;
    z-index:10;
}

h1{
    font-size:75px;
    color:#00ffff;
    text-shadow:0 0 20px cyan,
                0 0 40px cyan,
                0 0 80px cyan;
}

h2{
    font-size:40px;
    margin-top:20px;
}

p{
    margin-top:15px;
    font-size:28px;
}

button{
    margin-top:35px;
    padding:15px 40px;
    border:none;
    border-radius:40px;
    background:#00e5ff;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 0 30px cyan;
}

button:hover{
    transform:scale(1.08);
}
</style>
</head>

<body>

<div class="planet"></div>

<div class="ufo">🛸</div>

<div class="alien">👽</div>

<div class="box">
    <h1>🔬 과학시간! 🚀</h1>
    <h2>안녕하세요! 이예인입니다.</h2>
    <p>잘 부탁드립니다.</p>

    <button onclick="location.href='main.html'">
        시작하기
    </button>
</div>

<script>

// 별
for(let i=0;i<180;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDuration=(1+Math.random()*3)+"s";
    document.body.appendChild(star);
}

// 유성
for(let i=0;i<6;i++){
    let s=document.createElement("div");
    s.className="shooting";
    s.innerHTML="☄️";
    s.style.animationDelay=(i*2)+"s";
    document.body.appendChild(s);
}

</script>

</body>
</html>
